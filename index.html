<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bolt Celeron</title>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a2e; padding: 30px; border-radius: 15px; width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; }
        input { background: #2a2a4a; color: #fff; }
        button { background: #00aaff; color: #fff; font-weight: bold; cursor: pointer; }
        #saida { margin-top: 20px; padding: 15px; background: #2a2a4a; border-radius: 8px; min-height: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Bolt Celeron</h1>
        <input type="text" id="entrada" placeholder="Digite sua pergunta...">
        <button id="enviar">Perguntar</button>
        <div id="saida">Aguardando...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
